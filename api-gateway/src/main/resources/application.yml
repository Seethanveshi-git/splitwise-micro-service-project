server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:redis-11781.crce263.ap-south-1-1.ec2.cloud.redislabs.com}
      port: ${SPRING_REDIS_PORT:11781}
      password: ${REDIS_PASSWORD:c6iBDzGsQz922Ocvt496JvAYr8n4fxAn}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: group-service
          uri: lb://GROUP-SERVICE
          predicates:
            - Path=/api/groups/**

        - id: expense-service
          uri: lb://EXPENSE-SERVICE
          predicates:
            - Path=/api/expenses/**
          filters:
            - name: SlidingWindowRateLimit
              args:
                limit: 2
                windowSeconds: 60

        - id: dashboard-service
          uri: lb://DASHBOARD-SERVICE
          predicates:
            - Path=/api/dashboard/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:*}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://service-registry.my-namespace.svc.cluster.local:8761/eureka/}
