server:
  port: 8082

spring:
  application:
    name: group-service
  datasource:
    url: jdbc:postgresql://localhost:5432/micro-service_group_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

auth-service:
  url: http://localhost:8081
