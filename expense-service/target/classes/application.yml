server:
  port: 0

spring:
  application:
    name: expense-service
  datasource:
    url: jdbc:postgresql://localhost:5432/micro-service_expense_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
