server:
  port: 8083

spring:
  application:
    name: expense-service
  datasource:
    url: ${EXPENSE_DB_URL:jdbc:postgresql://localhost:5432/micro-service_expense_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
